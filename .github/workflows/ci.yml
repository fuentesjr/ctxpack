name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
      - run: bundle exec rake test
      - name: Advisory metz scan
        continue-on-error: true
        run: |
          gem install metz-scan -v 0.4.0
          bundle exec rake metz
