    - path: app/models/beta_two.rb
      reason_code: referenced_constant
    - path: app/models/gamma_three.rb
      reason_code: referenced_constant
    - path: app/models/delta_four.rb
      reason_code: referenced_constant
    - path: test/controllers/saturation_controller_test.rb
      reason_code: minitest_candidate

  exclude:
