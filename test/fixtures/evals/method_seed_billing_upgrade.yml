    - kind: method
      evidence: Billing::Subscriptions#upgrade!
  task: Inspect upgrade! on billing subscriptions

expect:
  include:
    - path: app/services/billing/subscriptions.rb
      reason_code: method_seed_primary

  exclude:
    - app/controllers/accounts_controller.rb
